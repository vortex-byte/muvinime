name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate update.json
        run: |
          cat > update.json << EOF
          {
            "version": "${{ steps.version.outputs.VERSION }}",
            "download_url": "https://github.com/vortex-byte/muvinime/releases/download/${{ github.ref_name }}/muvinime.zip",
            "requires": "5.0",
            "tested": "6.7",
            "requires_php": "7.4",
            "last_updated": "$(date -u +%Y-%m-%d)",
            "author": "<a href=\"https://t.me/kenzo_id\">Z</a>",
            "sections": {
              "description": "Anime uploader plugin for WordPress. Automatically posts anime episodes and series from configured sources.",
              "changelog": "<h4>${{ steps.version.outputs.VERSION }}</h4><ul><li>See GitHub release for full changelog.</li></ul>"
            }
          }
          EOF

      - name: Commit update.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add update.json
          git commit -m "chore: update update.json to v${{ steps.version.outputs.VERSION }}" || echo "Nothing to commit"
          git push

      - name: Create release zip
        run: |
          mkdir -p build/muvinime
          rsync -av --exclude='.git' --exclude='.github' --exclude='build' --exclude='app.log' --exclude='composer.lock' --exclude='data.json' ./ build/muvinime/
          cd build && zip -r ../muvinime.zip muvinime/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: muvinime.zip
          generate_release_notes: true
